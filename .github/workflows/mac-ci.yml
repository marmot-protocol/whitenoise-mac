name: Mac CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: read

concurrency:
  group: mac-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT: whitenoise-mac.xcodeproj
  SCHEME: whitenoise-mac
  DESTINATION: platform=macOS

jobs:
  test-and-build:
    name: PR Checks
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Show Xcode environment
        run: |
          sw_vers
          xcodebuild -version
          xcodebuild -showsdks
          xcodebuild -list -project "$PROJECT"
          xcodebuild -showTestPlans -project "$PROJECT" -scheme "$SCHEME"

      - name: Swift format lint
        run: |
          xcrun swift-format lint \
            --configuration .swift-format \
            --recursive \
            --parallel \
            --strict \
            whitenoise-mac \
            whitenoise-macTests \
            whitenoise-macUITests

      - name: macOS project sanity checks
        run: scripts/ci/macos-sanity-checks.sh

      - name: Unit tests
        run: |
          set -o pipefail
          rm -rf TestResults.xcresult
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -testPlan PR \
            -destination "$DESTINATION" \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mac-unit-test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
          retention-days: 7

      - name: Release build smoke (arm64)
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "$DESTINATION" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO

  static-analysis:
    name: Static Analysis
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Analyze Debug build
        run: |
          set -o pipefail
          xcodebuild analyze \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO
